# Cloud Build config for the socbench image.
#
# The Dockerfile lives at deploy/gcp/Dockerfile (not the build-context root), so
# `gcloud builds submit --tag` can't be used — it requires a root Dockerfile.
# Instead we invoke docker build with an explicit -f. Build context is the repo
# root (trimmed by the root .dockerignore) so the image gets src/ + config/.
#
# Invoke:
#   gcloud builds submit . --config deploy/gcp/cloudbuild.yaml \
#     --substitutions _IMAGE=us-west1-docker.pkg.dev/PROJECT/tempo/socbench:TAG
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deploy/gcp/Dockerfile", "-t", "${_IMAGE}", "."]
images:
  - "${_IMAGE}"
