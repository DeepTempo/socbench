# socbench benchmark configuration
# All defaults below are safe for a laptop. Override per-dataset, per-stratum,
# per-provider as needed.

# Sibling-file paths (schema, pricing) are resolved RELATIVE TO THIS FILE,
# so moving the `config/` folder doesn't require code edits.
schema_path: schema.json
pricing_path: pricing.yaml

paths:
  index_root: indexes
  runs_root: runs
  ablations_root: ablations
  cache_dir: .cache

# Step A — corpus index
index:
  # host_egress assignment threshold: a src_ip reaching >= K distinct dst_ips
  # (label-agnostic) within the time window is scoped as host_egress instead of
  # per-(src,dst) pair_timeline units.
  host_egress_fanout_K: 10
  host_egress_window_minutes: 5

  # Max flows per eval unit. Units larger than this are split into contiguous
  # time sub-windows so each stays tractable under a model's effective context
  # window (≈200k-token budget at ~90 tokens/flow, ~50% reserved).
  max_flows_per_unit: 1000

  # Rendering caps per provider. Used only by the agent loop, but kept here so
  # one config file drives every step.
  rendering_caps_per_provider:
    claude: 600
    gpt: 1200
    gemini: 3000

# Agent loop policy
# Each persona declares both its loop budget (turns / tool calls / wall clock)
# and the exact set of tools it may invoke. This block is the single source of
# truth for the persona × tool matrix — the tool registry, prompt assembly,
# and the agent loop all read from here.
#
# Editing `tools:` for any persona changes the `tools_manifest_sha` recorded
# in run metadata, so the eval-set fingerprint moves with the policy.
agent:
  cost_usd_cap_per_rendering: 0.50
  # Withhold submit_assessment + force a tool call until this many investigative
  # tool calls are made, identically for every provider. 0 = off (main, comparable
  # to the published leaderboard). Set to 1 only for the gated "forced-investigation"
  # ablation — it gates every provider and is NOT leaderboard-comparable.
  min_investigation_tool_calls: 0
  personas:
    soc_analyst:
      max_turns: 4
      max_tool_calls: 6
      wall_clock_seconds: 60
      tools:
        - list_pairs
        - get_pair_timeline
        - get_flows
        - host_rollup
        - submit_assessment
    threat_analyst:
      max_turns: 8
      max_tool_calls: 12
      wall_clock_seconds: 120
      tools:
        - list_pairs
        - get_pair_timeline
        - get_flows
        - host_rollup
        - top_destinations
        - pair_stats
        - submit_assessment
    adversary_hunter:
      max_turns: 10
      max_tool_calls: 16
      wall_clock_seconds: 150
      tools:
        - list_pairs
        - get_pair_timeline
        - get_flows
        - host_rollup
        - top_destinations
        - pair_stats
        - port_proto_matrix
        - rarity_stats
        - submit_assessment
    detection_engineer:
      max_turns: 12
      max_tool_calls: 20
      wall_clock_seconds: 180
      tools:
        - list_pairs
        - get_pair_timeline
        - get_flows
        - host_rollup
        - top_destinations
        - pair_stats
        - port_proto_matrix
        - rarity_stats
        - submit_assessment

# Sampling
sampling:
  sample_seed: 7
  smoke:
    units_per_stratum: 1
    min_total_units: 8
    cost_budget_usd: 10
  full:
    # ~1,500 balanced units: caps the dominant strata at 500 and pulls in every
    # host_egress malicious/mixed unit and the scarce pair_timeline mal/mixed.
    # Available strata: he:benign 87, he:mal 410, he:mixed 932, pt:benign 15936,
    # pt:mal 5, pt:mixed 1 → 87+410+500+500+5+1 = ~1,503 selected at
    # units_per_stratum=500, then capped to full_unit_cap (~66% host_egress).
    # cost_budget_usd here is a fallback; the launch script overrides it per
    # provider (--cost-budget-usd 700 openai/gemini, 900 anthropic).
    units_per_stratum: 500
    full_unit_cap: 1500
    cost_budget_usd: 900

# Providers — wired into the agent loop. Model identities are pinned per run.
providers:
  openai:
    enabled: false
    model: gpt-5.4
    max_output_tokens: 2048
    timeout_seconds: 60
    max_retries: 3
    max_concurrency: 6
    # OpenAI reasoning models are chattier (~7 turns vs ~5 for peers) and slower,
    # so they exhaust persona turn/wall/cost budgets on large host_egress units and
    # get forced into invalid submissions. The 1.5x bump is now expressed via the
    # reasoning_model flag (REASONING_BUDGET_MULTIPLIER), shared with every other
    # reasoning model so the loop budget is keyed to the model property, not provider.
    reasoning_model: true
  anthropic:
    enabled: false
    model: claude-opus-4-7
    max_output_tokens: 2048
    timeout_seconds: 60
    max_retries: 3
    max_concurrency: 8
  gemini:
    enabled: false
    model: gemini-2.5-pro
    max_output_tokens: 2048
    timeout_seconds: 60
    max_retries: 3
    max_concurrency: 8

  # Open-source models served locally via vLLM inside a Vertex AI Custom Job.
  # Set OPEN_SOURCE_BASE_URL=http://localhost:8000/v1 in the container env;
  # model is the Hugging Face repo id (e.g. fdtn-ai/Foundation-Sec-8B-Reasoning
  # or AlicanKiraz0/Seneca-Cybersecurity-LLM-x-QwQ-32B-Q4_Medium-Version).
  # Concurrency is kept low (1) because there is only one local GPU instance;
  # raise it if you use tensor parallelism across multiple GPUs.
  open_source:
    enabled: false
    model: fdtn-ai/Foundation-Sec-8B-Reasoning
    # max_output_tokens is the VISIBLE (post-reasoning) output budget — identical
    # semantics to Gemini/Anthropic, so the providers are compared apples-to-apples.
    # Reasoning gets its OWN budget below; it does not eat this one.
    max_output_tokens: 2048
    # Separate thinking budget for reasoning models (QwQ, Foundation-Sec-Reasoning),
    # which emit a long chain of thought BEFORE the tool call. The adapter sends
    # vLLM thinking_token_budget=reasoning_budget_tokens and widens the total
    # max_tokens to max_output_tokens + reasoning_budget_tokens, mirroring how the
    # hosted APIs separate thinking from output server-side. REQUIRES the vLLM
    # server to run with --reasoning-parser (minimax_m2 for Llama-3.1 backbones,
    # deepseek_r1 for QwQ/Qwen-2.5) or the CoT lands in content and scores zero.
    #
    # Value chosen to MATCH the hosted reasoning effort so the comparison is fair:
    #   - Gemini 2.5 Pro: default thinking budget is 8192 tokens; with dynamic
    #     thinking the max thinking is also capped at 8192. This is the closest
    #     analogue since Gemini separates thinking from output exactly like we do.
    #   - OpenAI gpt-5.x medium effort (the default): ~1k-4k reasoning tokens on
    #     hard prompts; the documented headroom rule is "visible budget + 5000".
    #   - Anthropic (claude-opus-4-7): extended thinking is not enabled here, so it
    #     runs in standard mode (0 reasoning) — the floor of the comparison.
    # 8192 sits at the Gemini default and above OpenAI's medium effort, giving the
    # open models the SAME thinking allowance a hosted reasoning model gets by
    # default. Keep max_output_tokens + reasoning_budget_tokens + prompt within the
    # server's --max-model-len (use >=32768 for reasoning models).
    reasoning_budget_tokens: 8192
    # Per-request deadline. The open_source adapter reads its HTTP timeout from
    # the OPEN_SOURCE_TIMEOUT_SECONDS env var (set by the deploy entrypoint),
    # NOT from this field — kept here as documentation of the intended budget.
    timeout_seconds: 600
    max_retries: 2
    # Concurrency drives decode contention. At 64 concurrent requests a slow
    # reasoning model decoded at ~0.08 tok/s/req — every request blew past the
    # HTTP deadline and was marked adapter_fatal. 8 keeps the decode batch busy
    # while leaving each request enough throughput to finish a turn in time.
    max_concurrency: 8
    temperature: null
    # The pinned open models (Seneca/QwQ, Foundation-Sec-Reasoning) ARE reasoning
    # models, so they get the SAME loop-budget bump (REASONING_BUDGET_MULTIPLIER)
    # as the hosted reasoning models — keyed to the model property, not provider
    # identity. This is the fair comparison: previously OpenAI's reasoning models
    # got 1.5x turns while the open reasoning models got 1.0x, so they hit the turn
    # cap and were force-finalised more often (a coverage artifact, not a capability
    # gap). Flag it OFF only when serving a NON-reasoning open model.
    reasoning_model: true
    # wall_clock_override_seconds relaxes ONLY the time bound (on top of the turn
    # budget): self-hosted inference is slow, so a rendering should terminate on the
    # turn/tool-call budget (as the fast APIs effectively do — they never reach their
    # wall-clock) rather than be force-cut mid-investigation. This gives more TIME,
    # not more turns. A high SAFETY backstop (30 min), not a routine cap: normal
    # renderings finish in minutes; this only stops a genuinely wedged one. Per-turn
    # generation is still bounded by OPEN_SOURCE_TIMEOUT_SECONDS (600s).
    wall_clock_override_seconds: 1800

# Default dataset entries. Each entry is a logical name → source parquet URI(s).
# `sample` ships with the repo (≤ 10 MB) so smoke runs need no downloads.
datasets:
  sample:
    paths:
      - data/sample/cic2018-mini.parquet
    label_group: malicious
  # Combined benign + Stratosphere malware captures, normalized to the canonical
  # schema by scripts/build_from_gcs.py. Per-flow labels; a `source` column
  # records the originating capture. Pull from GCS before build-index:
  #   gcloud storage cp \
  #     gs://your-bucket/benchmark-v0/combined/benchmark-v0-canonical.parquet \
  #     data/benchmark-v0.parquet
  benchmark-v0:
    paths:
      - data/benchmark-v0.parquet
    label_group: malicious
